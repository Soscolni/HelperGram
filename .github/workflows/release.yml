name: Release

on:
  push:
    tags:
      - 'v*'
    branches:
      - 'release/v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            build_script: build:win
            artifacts: |
              dist/*.exe
              dist/*.exe.blockmap
          - os: macos-latest
            build_script: build:mac
            artifacts: |
              dist/*.dmg
              dist/*.dmg.blockmap
              dist/*.zip

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Determine release tag
        id: tag
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            # Branch is like "release/v4.0.0" — strip the "release/" prefix
            tag="${GITHUB_REF_NAME#release/}"
            echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          fi

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run ${{ matrix.build_script }}
        env:
          # Skip macOS code-signing / notarization — no certificates configured yet.
          # Users will see a Gatekeeper warning on first launch until signing is added.
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          target_commitish: main
          draft: false
          prerelease: false
          generate_release_notes: true
          fail_on_unmatched_files: false
          files: ${{ matrix.artifacts }}
